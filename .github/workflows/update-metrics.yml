name: Update DKnowC Official Doc Writer Metrics

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - update-dknowc-official-doc-writer-metrics

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update metrics
        run: npm run update:metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.csv
          if git diff --cached --quiet; then
            echo "No metric changes to commit."
          else
            git commit -m "chore(metrics): update dknowc official doc writer metrics"
            git push
          fi
